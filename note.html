<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Nota</title>
  <script src="https://cdn.jsdelivr.net/npm/marked@2.1.3/marked.min.js"></script>

</head>

<body>
  <div class="container">
    <div class="note-content">
      <h1>Título da Nota</h1>
      <div id="markdown-content">
        <!-- O conteúdo da nota em markdown será inserido aqui -->
      </div>
    </div>
  </div>


  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const urlParams = new URLSearchParams(window.location.search);
      const noteName = urlParams.get("note");

      if (noteName) {

        // Carregue o conteúdo da nota em Markdown do arquivo correspondente
        fetch(`notes/${noteName}.md`)
          .then(response => response.text())
          .then(markdown => {
            const markdownContent = document.querySelector("#markdown-content");
            markdownContent.innerHTML = marked(markdown);
          });
      }
    });
  </script>
</body>

</html>
